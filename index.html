    <script type="text/javascript" src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <script type="text/javascript" src="https://s0.2mdn.net/ads/studio/cached_libs/gsap_3.2.4_min.js"></script>
    <script type="text/javascript" src="index.js"></script>
    <script type="text/javascript">
        window.onload = function() {

            if (!Enabler.isInitialized()) {
                Enabler.addEventListener(studio.events.StudioEvent.INIT, enablerInitialized);
            } else {
                enablerInitialized();
            }

            function enablerInitialized() {
                if (!Enabler.isVisible()) {
                    Enabler.addEventListener(studio.events.StudioEvent.VISIBLE, adVisible);
                } else {
                    adVisible();
                }
            }

            function adVisible() {
                nameSpace.init();
            }
        };
    </script>
